<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday-Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(to top, yellow, rgb(247, 7, 139));
            background-image: url('/asset/happy-birthday-flags-balloons-card-background.png'), linear-gradient(skyblue, blue);
            background-repeat: no-repeat;
            background-size: contain;
            background-position: top center;
        }


        div {
            width: 100;
            height: 100vh;
            background-image: url('/asset/—Pngtree—fun\ colourful\ confetti\ pattern\ background_5603070.png');
            animation: part 2s linear infinite;
        }


        @keyframes part {
            0% {
                background-position: 0% 0%;
            }

            100% {
                background-position: -10% -100%;
            }
        }
    </style>
</head>

<body>
    <div>
    </div>
</body>

</html>
