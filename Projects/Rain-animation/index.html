<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rain-Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background-image: url('/images3.jpg');
            background-repeat: no-repeat;
            background-size: 100% 100%;
        }

        div {
            width: 100vw;
            height: 100vh;
            background-image: url(/rain.png);
            animation: raining 2s linear infinite;
        }
        @keyframes raining {
            0%{
                background-position: 0% 0%;
            }
            100%{
                background-position: 10% 100%;
            }
        }
    </style>
</head>

<body>
    <div></div>
</body>

</html>
